<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fever Temperature Simulation</title>
  <script src="sound_fx.js"></script>
  <style>
    body {
      font-family: 'Nunito', 'Comic Sans MS', sans-serif;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      user-select: none;
      color: #333;
      overflow: hidden;
      /* Prevents scrollbars */
    }

    /* Scaling the wrapper instead of the body prevents layout clipping */
    .game-wrapper {
      transform: scale(1.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      margin-top: 0;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 1.2rem;
      background: white;
      padding: 8px 25px;
      border-radius: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      color: #5e35b1;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .clinic-room {
      display: flex;
      gap: 60px;
      align-items: center;
      background: rgba(255, 255, 255, 0.4);
      padding: 40px;
      border-radius: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 4px solid white;
    }

    .patient-bed {
      width: 220px;
      height: 250px;
      background: white;
      border-radius: 30px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      border: 5px dashed #ff8a80;
      animation: feverGlow 2s infinite alternate;
    }

    @keyframes feverGlow {
      0% {
        box-shadow: 0 0 10px rgba(255, 82, 82, 0.2);
      }

      100% {
        box-shadow: 0 0 30px rgba(255, 82, 82, 0.6);
      }
    }

    .patient-bed.drag-over {
      transform: scale(1.05);
      background: #ffebee;
      border-style: solid;
    }

    .patient-img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      pointer-events: none;
    }

    .thermometer-container {
      cursor: grab;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: transform 0.2s;
    }

    .thermometer-container:active {
      cursor: grabbing;
      transform: rotate(15deg) scale(1.1);
    }

    .glass-tube {
      width: 35px;
      height: 180px;
      background: rgba(255, 255, 255, 0.8);
      border: 4px solid #b0bec5;
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      position: relative;
      display: flex;
      justify-content: center;
    }

    .bulb {
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #ff5252, #c62828);
      border: 4px solid #b0bec5;
      border-radius: 50%;
      margin-top: -8px;
      z-index: 3;
    }

    .liquid-track {
      width: 12px;
      height: 90%;
      background: #eeeeee;
      position: absolute;
      bottom: 0;
      border-radius: 10px 10px 0 0;
      display: flex;
      align-items: flex-end;
    }

    .red-liquid {
      width: 100%;
      height: 15%;
      background: linear-gradient(to right, #ff5252, #d32f2f);
      border-radius: 10px 10px 0 0;
      transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .marks {
      position: absolute;
      left: 28px;
      height: 85%;
      bottom: 10px;
      width: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .mark {
      width: 8px;
      height: 2px;
      background: #90a4ae;
    }

    .mark.danger {
      background: #d32f2f;
      width: 12px;
    }

    .reset-btn {
      margin-top: 30px;
      padding: 12px 35px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      background: #4fc3f7;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 6px 0 #0288d1;
      transition: all 0.1s;
    }

    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0288d1;
    }

    /* Button is absolute to the unscaled body */
    #why-though-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-family: inherit;
      font-size: 1.5rem;
      font-weight: bold;
      background-color: #f8e5b4;
      border: 3px solid #5a4b3c;
      border-radius: 10px;
      color: #5a4b3c;
      padding: 10px 20px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      z-index: 100;
      display: none;
      transition: transform 0.2s;
    }

    #why-though-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="game-wrapper">
    <h1>Doctor's Office 🩺</h1>
    <div class="subtitle" id="status-text">Drag the thermometer to check the boy!</div>

    <div class="clinic-room">
      <div class="patient-bed" id="patient-dropzone">
        <img src="images/sick-boy-with-fever-in-bed-illustration-svg-download-png-13073113.png" class="patient-img"
          alt="Sick Boy">
      </div>

      <div class="thermometer-container" id="thermometer" draggable="true">
        <div class="glass-tube">
          <div class="liquid-track">
            <div class="red-liquid" id="red-liquid"></div>
          </div>
          <div class="marks">
            <div class="mark danger"></div>
            <div class="mark"></div>
            <div class="mark"></div>
            <div class="mark"></div>
            <div class="mark"></div>
          </div>
        </div>
        <div class="bulb"></div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetSim()">Check Another Patient</button>
  </div>

  <!-- Kept completely outside the scaled wrapper -->
  <button id="why-though-btn">why?</button>

  <script>
    const thermometer = document.getElementById('thermometer');
    const dropzone = document.getElementById('patient-dropzone');
    const redLiquid = document.getElementById('red-liquid');
    const statusText = document.getElementById('status-text');
    const whyBtn = document.getElementById('why-though-btn');

    let temperatureChecked = false;

    // Sound effect setup
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playDragSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    thermometer.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', 'thermometer');
      setTimeout(() => { thermometer.style.opacity = '0.5'; }, 0);
      playDragSound();
    });

    thermometer.addEventListener('dragend', () => {
      thermometer.style.opacity = '1';
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!temperatureChecked) dropzone.classList.add('drag-over');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('drag-over');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (!temperatureChecked) checkTemperature();
    });

    function checkTemperature() {
      temperatureChecked = true;
      statusText.innerText = "Checking temperature... ⏳";

      setTimeout(() => {
        redLiquid.style.height = '85%';
        setTimeout(() => {
          statusText.style.color = "#d32f2f";
          statusText.innerText = "Oh no! 102°F - He has a fever! 🌡️🔥";
          whyBtn.style.display = 'block';
          if (window.SoundFX) SoundFX.playAlarm();
        }, 1500);
      }, 500);
    }

    function resetSim() {
      temperatureChecked = false;
      redLiquid.style.height = '15%';
      statusText.style.color = "#5e35b1";
      statusText.innerText = "Drag the thermometer to check the boy!";
      whyBtn.style.display = 'none';
    }

    whyBtn.addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
    });
  </script>

</body>

</html>
