<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Friction Walker Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
    color: #f8fafc;
    overflow: hidden;
  }
  .container {
    background: #1e293b;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transform: scale(1.3);
    transform-origin: center;
  }
  canvas {
    background: #0f172a;
    border-radius: 12px;
    border: 2px solid #334155;
  }
  .controls {
    display: flex;
    gap: 16px;
    width: 100%;
    justify-content: center;
  }
  button {
    flex: 1;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  #runBtn {
    background: #3b82f6;
    color: white;
  }
  #runBtn:active {
    background: #2563eb;
    transform: scale(0.98);
  }
  #runBtn.active {
    background: #10b981;
  }
  #fricBtn {
    background: #475569;
    color: white;
  }
  #fricBtn.active {
    background: #f59e0b;
    color: #fff;
  }
  .status {
    font-family: monospace;
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
    min-height: 20px;
  }
  #why-though-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-family: 'Walter Turncoat', cursive;
    font-size: 1.5rem;
    background-color: #f8e5b4;
    border: 3px solid #5a4b3c;
    border-radius: 10px;
    color: #5a4b3c;
    padding: 10px 20px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    cursor: pointer;
    z-index: 60;
    transition: transform 0.2s;
  }
  #why-though-btn:hover {
    transform: scale(1.05);
  }
</style>
</head>
<body>

<div class="container">
  <canvas id="sim" width="600" height="300"></canvas>
  <div class="status" id="statusText">System Idle</div>
  <div class="controls">
    <button id="runBtn">Hold to Run</button>
    <button id="fricBtn" class="active">Friction: HIGH</button>
  </div>
</div>

<button id="why-though-btn">Why though?</button>

<script>
  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const runBtn = document.getElementById('runBtn');
  const fricBtn = document.getElementById('fricBtn');
  const statusText = document.getElementById('statusText');

  // Simulation State
  let state = {
    x: 100,
    y: 220,
    frame: 0,
    isRunning: false,
    friction: true,
    speed: 3
  };

  // Event Listeners
  const startRunning = () => { state.isRunning = true; runBtn.classList.add('active'); runBtn.textContent = 'Running...'; };
  const stopRunning = () => { state.isRunning = false; runBtn.classList.remove('active'); runBtn.textContent = 'Hold to Run'; };
  
  runBtn.addEventListener('mousedown', startRunning);
  runBtn.addEventListener('mouseup', stopRunning);
  runBtn.addEventListener('mouseleave', stopRunning);
  runBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRunning(); });
  runBtn.addEventListener('touchend', stopRunning);

  fricBtn.addEventListener('click', () => {
    state.friction = !state.friction;
    fricBtn.classList.toggle('active', state.friction);
    fricBtn.textContent = state.friction ? 'Friction: HIGH' : 'Friction: ZERO';
  });

  // Notify parent when user is done
  document.getElementById('why-though-btn').addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
  });

  // Render Logic
  function drawFloor() {
    ctx.beginPath();
    ctx.moveTo(0, state.y);
    ctx.lineTo(canvas.width, state.y);
    ctx.strokeStyle = state.friction ? '#475569' : '#0ea5e9';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Draw static environment markers to show movement
    ctx.fillStyle = state.friction ? '#334155' : '#0284c7';
    for (let i = 0; i < 20; i++) {
      ctx.fillRect((i * 100) - (state.x % 100), state.y, 4, 10);
    }
  }

  function drawWalker() {
    ctx.save();
    ctx.translate(state.x, state.y);

    const legSwing = Math.sin(state.frame) * 25;
    const armSwing = Math.sin(state.frame) * 20;
    const bounce = Math.abs(Math.cos(state.frame)) * 5;

    ctx.translate(0, -bounce); // Vertical bobbing

    ctx.strokeStyle = '#f8fafc';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Back Arm
    ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(armSwing, -20); ctx.stroke();
    // Back Leg
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-legSwing, 0); ctx.stroke();
    
    // Torso
    ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(0, -20); ctx.stroke();
    
    // Head
    ctx.fillStyle = '#f8fafc';
    ctx.beginPath(); ctx.arc(0, -65, 12, 0, Math.PI * 2); ctx.fill();

    // Front Leg
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(legSwing, 0); ctx.stroke();
    // Front Arm
    ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(-armSwing, -20); ctx.stroke();

    ctx.restore();
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (state.isRunning) {
      if (state.friction) {
        state.frame += 0.15; // Normal animation speed
        state.x += state.speed; // Forward movement
        statusText.textContent = "Force applied -> Friction engages -> Forward motion";
        statusText.style.color = "#10b981";
      } else {
        state.frame += 0.4; // Fast animation speed (slipping)
        // state.x remains unchanged (no forward movement)
        statusText.textContent = "Force applied -> Zero friction -> Total slip (No motion)";
        statusText.style.color = "#f59e0b";
      }
    } else {
      // Idle state
      state.frame = 0;
      statusText.textContent = "System Idle";
      statusText.style.color = "#94a3b8";
    }

    // Loop walker around screen
    if (state.x > canvas.width + 40) {
      state.x = -40;
    }

    drawFloor();
    drawWalker();

    requestAnimationFrame(update);
  }

  update();
</script>
</body>
</html>
