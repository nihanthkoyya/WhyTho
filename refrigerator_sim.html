<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freezing and Melting Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
<style>
  body {
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f5f5f5;
    user-select: none;
    transform: scale(1.3);
    transform-origin: center;
    overflow: hidden;
  }
  .container {
    display: flex;
    gap: 30px;
  }
  .zone {
    width: 300px;
    height: 400px;
    border: 4px dashed #ccc;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #kitchen {
    background-color: #fff8e1;
    border-color: #ffc107;
  }
  #kitchen::before {
    content: 'Kitchen Counter (Warm)';
    position: absolute;
    top: 15px;
    color: #d4a106;
    font-size: 20px;
    font-weight: bold;
  }
  #fridge {
    background-color: #e3f2fd;
    border-color: #2196f3;
  }
  #fridge::before {
    content: 'Inside Fridge (Cold)';
    position: absolute;
    top: 15px;
    color: #1976d2;
    font-size: 20px;
    font-weight: bold;
  }
  #cup {
    width: 120px;
    height: 140px;
    border: 5px solid #444;
    border-top: none;
    border-radius: 0 0 15px 15px;
    cursor: grab;
    position: absolute;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
    background: white;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
  #cup:active {
    cursor: grabbing;
  }
  #liquid {
    width: 100%;
    height: 85%;
    background-color: #2196f3;
    transition: background-color 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
</style>
    <script src="sound_fx.js"></script>
</head>
<body>

<div class="container">
  <div class="zone" id="kitchen"></div>
  <div class="zone" id="fridge"></div>
</div>

<div id="cup" draggable="true">
  <div id="liquid">Water</div>
</div>

<button id="why-though-btn"
    style="position: absolute; bottom: 20px; right: 20px; font-family: 'Walter Turncoat', cursive; font-size: 1.5rem; background-color: #f8e5b4; border: 3px solid #5a4b3c; border-radius: 10px; color: #5a4b3c; padding: 10px 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); cursor: pointer; z-index: 60; transition: transform 0.2s;">Why
    though?</button>

<script>
  const cup = document.getElementById('cup');
  const liquid = document.getElementById('liquid');
  const kitchen = document.getElementById('kitchen');
  const fridge = document.getElementById('fridge');

  let inFridge = false;
  let freezeLevel = 0; // 0 = liquid water, 100 = solid ice

  // Place cup in kitchen initially
  kitchen.appendChild(cup);

  // Sound effect for interaction
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();
  function playDragSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
  }

  // Drag and Drop Logic
  cup.addEventListener('dragstart', (e) => {
    setTimeout(() => cup.style.opacity = '0.5', 0);
    playDragSound();
  });

  cup.addEventListener('dragend', (e) => {
    cup.style.opacity = '1';
  });

  const zones = [kitchen, fridge];
  zones.forEach(zone => {
    zone.addEventListener('dragover', (e) => e.preventDefault());
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.appendChild(cup);
      inFridge = (zone.id === 'fridge');
    });
  });

  // Simulation Loop Logic
  setInterval(() => {
    if (inFridge && freezeLevel < 100) {
      freezeLevel += 0.5; // Slowly freeze
    } else if (!inFridge && freezeLevel > 0) {
      freezeLevel -= 0.5; // Slowly melt
    }
    updateState();
  }, 30);

  function updateState() {
    // RGB interpolation from dark blue (Water: 33, 150, 243) to light blue (Ice: 179, 229, 252)
    const r = Math.floor(33 + (179 - 33) * (freezeLevel / 100));
    const g = Math.floor(150 + (229 - 150) * (freezeLevel / 100));
    const b = Math.floor(243 + (252 - 243) * (freezeLevel / 100));
    
    liquid.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

    // Update Text
    if (freezeLevel < 10) {
      liquid.innerText = 'Water';
    } else if (freezeLevel < 90) {
      liquid.innerText = inFridge ? 'Freezing...' : 'Melting...';
    } else {
      liquid.innerText = 'Ice';
    }
  }

  // Notify parent when user is done
  document.getElementById('why-though-btn').addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
  });
</script>

</body>
</html>
