<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freezing and Melting Simulation</title>
  <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      user-select: none;
      overflow: hidden;
    }

    /* Scaling the wrapper instead of the body prevents clipping */
    .viewport-wrapper {
      transform: scale(1.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .zone {
      width: 300px;
      height: 400px;
      border: 4px dashed #ccc;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #kitchen {
      background-color: #fff8e1;
      border-color: #ffc107;
    }

    #kitchen::before {
      content: 'Kitchen Counter (Warm)';
      position: absolute;
      top: 15px;
      color: #d4a106;
      font-size: 20px;
      font-weight: bold;
    }

    #fridge {
      background-color: #e3f2fd;
      border-color: #2196f3;
    }

    #fridge::before {
      content: 'Inside Fridge (Cold)';
      position: absolute;
      top: 15px;
      color: #1976d2;
      font-size: 20px;
      font-weight: bold;
    }

    #cup {
      width: 120px;
      height: 140px;
      border: 5px solid #444;
      border-top: none;
      border-radius: 0 0 15px 15px;
      cursor: grab;
      position: absolute;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: white;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    #liquid {
      width: 100%;
      height: 85%;
      background-color: #2196f3;
      transition: background-color 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }

    #why-though-btn {
      align-self: flex-end;
      font-family: 'Walter Turncoat', cursive;
      font-size: 1.2rem;
      background-color: #f8e5b4;
      border: 3px solid #5a4b3c;
      border-radius: 10px;
      color: #5a4b3c;
      padding: 8px 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #why-though-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="viewport-wrapper">
    <div class="container">
      <div class="zone" id="kitchen"></div>
      <div class="zone" id="fridge"></div>
    </div>

    <!-- Button moved inside the wrapper -->
    <button id="why-though-btn">why?</button>
  </div>

  <div id="cup" draggable="true">
    <div id="liquid">Water</div>
  </div>

  <script>
    const cup = document.getElementById('cup');
    const liquid = document.getElementById('liquid');
    const kitchen = document.getElementById('kitchen');
    const fridge = document.getElementById('fridge');

    let inFridge = false;
    let freezeLevel = 0;

    kitchen.appendChild(cup);

    // Interaction Sound
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playDragSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // Drag Logic
    cup.addEventListener('dragstart', () => {
      setTimeout(() => cup.style.opacity = '0.5', 0);
      playDragSound();
    });

    cup.addEventListener('dragend', () => cup.style.opacity = '1');

    [kitchen, fridge].forEach(zone => {
      zone.addEventListener('dragover', (e) => e.preventDefault());
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.appendChild(cup);
        inFridge = (zone.id === 'fridge');
      });
    });

    // Sim Loop
    setInterval(() => {
      if (inFridge && freezeLevel < 100) freezeLevel += 0.5;
      else if (!inFridge && freezeLevel > 0) freezeLevel -= 0.5;
      updateState();
    }, 30);

    function updateState() {
      const r = Math.floor(33 + (179 - 33) * (freezeLevel / 100));
      const g = Math.floor(150 + (229 - 150) * (freezeLevel / 100));
      const b = Math.floor(243 + (252 - 243) * (freezeLevel / 100));
      liquid.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

      if (freezeLevel < 10) liquid.innerText = 'Water';
      else if (freezeLevel < 90) liquid.innerText = inFridge ? 'Freezing...' : 'Melting...';
      else liquid.innerText = 'Ice';
    }

    document.getElementById('why-though-btn').addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
    });
  </script>
</body>

</html>
