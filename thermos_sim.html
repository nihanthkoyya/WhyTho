<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heat & Insulation Game</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      margin: 0;
      padding: 20px;
      user-select: none;
      min-height: 100vh;
      overflow: hidden;
    }

    .game-wrapper {
      transform: scale(1.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #00838f;
      font-size: 32px;
      text-shadow: 2px 2px 0px white;
      margin-bottom: 20px;
    }

    .game-board {
      display: flex;
      gap: 60px;
      align-items: flex-end;
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .pitcher {
      width: 100px;
      height: 130px;
      background: #ffe082;
      border: 6px solid #ffb300;
      border-radius: 20px;
      cursor: grab;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .pitcher::before {
      content: '';
      position: absolute;
      left: -35px;
      top: 15px;
      width: 30px;
      height: 60px;
      border: 6px solid #ffb300;
      border-radius: 15px;
    }

    .tea-liquid {
      width: 100%;
      height: 80%;
      background: #ff5722;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
    }

    .station {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Increased gap to move text higher above the lid's range */
      gap: 50px;
    }

    .label {
      font-size: 18px;
      font-weight: bold;
      color: #555;
      position: relative;
      z-index: 100;
    }

    .gauge-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .thermometer {
      width: 25px;
      height: 100px;
      background: #eee;
      border: 4px solid #bbb;
      border-radius: 15px;
      display: flex;
      align-items: flex-end;
      padding: 3px;
    }

    .temp-fill {
      width: 100%;
      height: 0%;
      background: #ff5722;
      border-radius: 10px;
      transition: height 0.3s;
    }

    .receptacle {
      width: 110px;
      height: 140px;
      position: relative;
      display: flex;
      align-items: flex-end;
    }

    .cup-body {
      width: 100%;
      height: 100%;
      background: #fff;
      border: 6px solid #90caf9;
      border-top: none;
      border-radius: 0 0 25px 25px;
      overflow: hidden;
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
    }

    .bottle-body {
      width: 100%;
      height: 100%;
      background: #e8f5e9;
      border: 6px solid #4caf50;
      border-radius: 20px;
      overflow: hidden;
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
    }

    .lid {
      width: 110%;
      height: 30px;
      background: #2e7d32;
      border-radius: 8px;
      position: absolute;
      left: -5%;
      top: -40px;
      transition: top 0.4s;
      z-index: 1;
      border: 3px solid #1b5e20;
    }

    .liquid-level {
      width: 100%;
      height: 0%;
      background: #ff5722;
      transition: height 0.5s;
    }

    .steam-group {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .steam-puff {
      width: 10px;
      height: 10px;
      background: rgba(200, 200, 200, 0.6);
      border-radius: 50%;
      animation: floatUp 2s infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(-40px) scale(2);
        opacity: 0;
      }
    }

    .reset-btn {
      margin-top: 30px;
      padding: 10px 30px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      background: #ff4081;
      color: white;
      border-radius: 15px;
      font-weight: bold;
    }

    #why-though-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: inherit;
      font-size: 1.5rem;
      background-color: #f8e5b4;
      border: 3px solid #5a4b3c;
      border-radius: 10px;
      color: #5a4b3c;
      padding: 10px 20px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>

<body>

  <div class="game-wrapper">
    <h1>Drag the Hot Tea! 🫖</h1>

    <div class="game-board">
      <div class="station">
        <div class="label">Hot Tea</div>
        <div class="pitcher" id="pitcher" draggable="true">
          <div class="tea-liquid">TEA</div>
        </div>
      </div>

      <div class="station">
        <div class="label">Regular Cup</div>
        <div class="gauge-container">
          <div class="thermometer">
            <div class="temp-fill" id="cup-temp"></div>
          </div>
          <div class="receptacle" id="cup-dropzone">
            <div class="steam-group" id="cup-steam">
              <div class="steam-puff"></div>
              <div class="steam-puff"></div>
              <div class="steam-puff"></div>
            </div>
            <div class="cup-body">
              <div class="liquid-level" id="cup-liquid"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="station">
        <div class="label">Magic Bottle</div>
        <div class="gauge-container">
          <div class="thermometer">
            <div class="temp-fill" id="bottle-temp"></div>
          </div>
          <div class="receptacle" id="bottle-dropzone">
            <div class="lid" id="bottle-lid"></div>
            <div class="steam-group" id="bottle-steam">
              <div class="steam-puff"></div>
              <div class="steam-puff"></div>
              <div class="steam-puff"></div>
            </div>
            <div class="bottle-body">
              <div class="liquid-level" id="bottle-liquid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">Do again 🔄</button>
  </div>

  <button id="why-though-btn">why?</button>

  <script>
    const pitcher = document.getElementById('pitcher');
    const cupDropzone = document.getElementById('cup-dropzone');
    const cupLiquid = document.getElementById('cup-liquid');
    const cupTempBar = document.getElementById('cup-temp');
    const cupSteam = document.getElementById('cup-steam');
    const bottleDropzone = document.getElementById('bottle-dropzone');
    const bottleLiquid = document.getElementById('bottle-liquid');
    const bottleTempBar = document.getElementById('bottle-temp');
    const bottleSteam = document.getElementById('bottle-steam');
    const bottleLid = document.getElementById('bottle-lid');
    const whyBtn = document.getElementById('why-though-btn');

    let cupState = { hasTea: false, temp: 0 };
    let bottleState = { hasTea: false, temp: 0 };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playPourSound() {
      const duration = 1.5;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + duration);

      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

      noise.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      noise.start();
    }

    pitcher.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', 'hot-tea');
      if (audioCtx.state === 'suspended') audioCtx.resume();
    });

    [cupDropzone, bottleDropzone].forEach(zone => {
      zone.addEventListener('dragover', (e) => e.preventDefault());
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        handlePour(zone.id);
      });
    });

    function handlePour(targetId) {
      if (targetId === 'cup-dropzone' && !cupState.hasTea) {
        playPourSound();
        cupState.hasTea = true;
        cupState.temp = 100;
        cupLiquid.style.height = '85%';
        cupSteam.style.opacity = '1';
      }
      else if (targetId === 'bottle-dropzone' && !bottleState.hasTea) {
        playPourSound();
        bottleState.hasTea = true;
        bottleState.temp = 100;
        bottleLiquid.style.height = '85%';
        bottleSteam.style.opacity = '1';
        setTimeout(() => {
          bottleLid.style.top = '-5px';
          bottleSteam.style.opacity = '0';
        }, 500);
      }
    }

    setInterval(() => {
      if (cupState.hasTea && cupState.temp > 10) {
        cupState.temp -= 0.4;
        if (cupState.temp < 50) cupSteam.style.opacity = '0';
      }

      if (bottleState.hasTea && bottleState.temp > 10) {
        bottleState.temp -= 0.02;
      }

      if (cupState.hasTea && cupState.temp <= 30) {
        whyBtn.style.display = 'block';
      }

      updateUI();
    }, 50);

    function updateUI() {
      if (cupState.hasTea) {
        cupTempBar.style.height = cupState.temp + '%';
        cupTempBar.style.background = getTemperatureColor(cupState.temp);
        cupLiquid.style.background = getTemperatureColor(cupState.temp);
      }
      if (bottleState.hasTea) {
        bottleTempBar.style.height = bottleState.temp + '%';
        bottleTempBar.style.background = getTemperatureColor(bottleState.temp);
        bottleLiquid.style.background = getTemperatureColor(bottleState.temp);
      }
    }

    function getTemperatureColor(temp) {
      const ratio = Math.max(0, Math.min(1, (temp - 20) / 80));
      const r = Math.floor(3 + (255 - 3) * ratio);
      const g = Math.floor(169 + (87 - 169) * ratio);
      const b = Math.floor(244 + (34 - 244) * ratio);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function resetGame() {
      cupState = { hasTea: false, temp: 0 };
      bottleState = { hasTea: false, temp: 0 };
      cupLiquid.style.height = '0%';
      bottleLiquid.style.height = '0%';
      cupTempBar.style.height = '0%';
      bottleTempBar.style.height = '0%';
      cupSteam.style.opacity = '0';
      bottleSteam.style.opacity = '0';
      bottleLid.style.top = '-40px';
      whyBtn.style.display = 'none';
    }

    whyBtn.addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
    });
  </script>

</body>

</html>
