<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat & Insulation Game</title>
<style>
  /* --- Child-Friendly Aesthetics --- */
  body { 
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
    margin: 0; 
    padding: 20px; 
    user-select: none; 
    min-height: 100vh;
    transform: scale(1.3);
    transform-origin: center;
    overflow: hidden;
  }
  
  h1 { 
    color: #00838f; 
    font-size: 36px;
    text-shadow: 2px 2px 0px white;
    margin-bottom: 40px;
  }

  .game-board { 
    display: flex; 
    gap: 80px; 
    align-items: flex-end; 
    background: white;
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  }
  
  /* --- Draggable Hot Tea Pitcher --- */
  .pitcher { 
    width: 120px; 
    height: 150px; 
    background: #ffe082; 
    border: 8px solid #ffb300; 
    border-radius: 20px 20px 30px 30px; 
    cursor: grab; 
    position: relative; 
    display: flex;
    align-items: flex-end;
    overflow: hidden;
    box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05), 0 10px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .pitcher:hover { transform: scale(1.05) rotate(-2deg); }
  .pitcher:active { cursor: grabbing; transform: scale(0.95) rotate(-10deg); }
  
  /* Pitcher Handle */
  .pitcher::before { 
    content: ''; position: absolute; left: -45px; top: 20px; 
    width: 40px; height: 70px; border: 8px solid #ffb300; border-radius: 20px; 
  }
  
  .tea-liquid { 
    width: 100%; height: 80%; background: #ff5722; 
    display: flex; justify-content: center; align-items: center; 
    color: white; font-weight: bold; font-size: 24px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }

  /* --- Container Wrappers & Labels --- */
  .station { 
    display: flex; flex-direction: column; align-items: center; gap: 15px; 
  }
  .label { font-size: 24px; font-weight: bold; color: #555; }
  
  /* --- Thermometers --- */
  .gauge-container { display: flex; align-items: center; gap: 15px; }
  .thermometer { 
    width: 30px; height: 120px; background: #eee; 
    border: 5px solid #bbb; border-radius: 20px; 
    display: flex; align-items: flex-end; padding: 4px; 
    position: relative;
  }
  .temp-fill { 
    width: 100%; height: 0%; background: #ff5722; 
    border-radius: 15px; transition: height 0.3s linear, background 0.3s; 
  }
  
  /* --- Receptacles (Cup & Bottle) --- */
  .receptacle { 
    width: 130px; height: 160px; 
    position: relative; display: flex; align-items: flex-end; 
    overflow: visible; 
  }
  .cup-body {
    width: 100%; height: 100%; background: #fff; 
    border: 8px solid #90caf9; border-top: none; 
    border-radius: 0 0 30px 30px; overflow: hidden;
    position: absolute; bottom: 0; display: flex; align-items: flex-end;
  }
  
  .bottle-body {
    width: 100%; height: 100%; background: #e8f5e9; 
    border: 8px solid #4caf50; border-radius: 20px 20px 30px 30px; 
    overflow: hidden; position: absolute; bottom: 0; 
    display: flex; align-items: flex-end;
  }
  
  /* Magic Bottle Lid */
  .lid { 
    width: 110%; height: 35px; background: #2e7d32; 
    border-radius: 10px; position: absolute; left: -5%; top: -50px; 
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    z-index: 10; border: 4px solid #1b5e20;
  }

  /* Liquid inside Receptacles */
  .liquid-level { 
    width: 100%; height: 0%; background: #ff5722; 
    transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; 
  }

  /* --- Steam Animation --- */
  .steam-group {
    position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; opacity: 0; transition: opacity 0.5s; z-index: 5;
  }
  .steam-puff {
    width: 15px; height: 15px; background: rgba(200,200,200,0.6); 
    border-radius: 50%; animation: floatUp 2s infinite ease-in;
  }
  .steam-puff:nth-child(2) { animation-delay: 0.5s; width: 20px; height: 20px; }
  .steam-puff:nth-child(3) { animation-delay: 1s; }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-60px) scale(3); opacity: 0; }
  }

  /* --- Reset Button --- */
  .reset-btn { 
    margin-top: 50px; padding: 15px 40px; font-size: 24px; font-family: inherit;
    cursor: pointer; border: none; background: #ff4081; color: white; 
    border-radius: 20px; font-weight: bold; 
    box-shadow: 0 8px 0 #c2185b, 0 15px 20px rgba(0,0,0,0.2); 
    transition: all 0.1s;
  }
  .reset-btn:active { 
    transform: translateY(8px); box-shadow: 0 0 0 #c2185b, 0 5px 10px rgba(0,0,0,0.2); 
  }

  /* Drop Zone Highlight */
  .highlight { border-color: #ff9800 !important; transform: scale(1.05); }

  /* Why though button */
  #why-though-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: bold;
    background-color: #f8e5b4;
    border: 3px solid #5a4b3c;
    border-radius: 10px;
    color: #5a4b3c;
    padding: 10px 20px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    cursor: pointer;
    z-index: 60;
    transition: transform 0.2s;
    display: none;
  }
  #why-though-btn:hover {
    transform: scale(1.05);
  }
</style>
    <script src="sound_fx.js"></script>
</head>
<body>

<h1>Drag the Hot Tea! 🫖</h1>

<div class="game-board">
  
  <div class="station">
    <div class="label">Hot Tea</div>
    <div class="pitcher" id="pitcher" draggable="true">
      <div class="tea-liquid">TEA</div>
    </div>
  </div>

  <div class="station">
    <div class="label">Regular Cup</div>
    <div class="gauge-container">
      <div class="thermometer"><div class="temp-fill" id="cup-temp"></div></div>
      <div class="receptacle" id="cup-dropzone">
        <div class="steam-group" id="cup-steam">
          <div class="steam-puff"></div><div class="steam-puff"></div><div class="steam-puff"></div>
        </div>
        <div class="cup-body">
          <div class="liquid-level" id="cup-liquid"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="station">
    <div class="label">Magic Bottle</div>
    <div class="gauge-container">
      <div class="thermometer"><div class="temp-fill" id="bottle-temp"></div></div>
      <div class="receptacle" id="bottle-dropzone">
        <div class="lid" id="bottle-lid"></div>
        <div class="steam-group" id="bottle-steam">
          <div class="steam-puff"></div><div class="steam-puff"></div><div class="steam-puff"></div>
        </div>
        <div class="bottle-body">
          <div class="liquid-level" id="bottle-liquid"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<button class="reset-btn" onclick="resetGame()">Start Over 🔄</button>
<button id="why-though-btn">Why though?</button>

<script>
  // DOM Elements
  const pitcher = document.getElementById('pitcher');
  
  const cupDropzone = document.getElementById('cup-dropzone');
  const cupLiquid = document.getElementById('cup-liquid');
  const cupTempBar = document.getElementById('cup-temp');
  const cupSteam = document.getElementById('cup-steam');
  
  const bottleDropzone = document.getElementById('bottle-dropzone');
  const bottleLiquid = document.getElementById('bottle-liquid');
  const bottleTempBar = document.getElementById('bottle-temp');
  const bottleSteam = document.getElementById('bottle-steam');
  const bottleLid = document.getElementById('bottle-lid');

  // Game State
  let cupState = { hasTea: false, temp: 0 };
  let bottleState = { hasTea: false, temp: 0 };

  // Sound effect for interaction
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();
  function playDragSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
  }

  // --- 1. Drag & Drop Interaction ---
  pitcher.addEventListener('dragstart', (e) => {
    pitcher.style.opacity = '0.7';
    e.dataTransfer.setData('text/plain', 'hot-tea');
    playDragSound();
  });
  pitcher.addEventListener('dragend', () => pitcher.style.opacity = '1');

  [cupDropzone, bottleDropzone].forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault(); 
      zone.children[zone.children.length-1].classList.add('highlight'); // Highlight border
    });
    zone.addEventListener('dragleave', () => {
      zone.children[zone.children.length-1].classList.remove('highlight');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.children[zone.children.length-1].classList.remove('highlight');
      handlePour(zone.id);
    });
  });

  // --- 2. Pouring Logic ---
  function handlePour(targetId) {
    if (targetId === 'cup-dropzone' && !cupState.hasTea) {
      cupState.hasTea = true;
      cupState.temp = 100;
      cupLiquid.style.height = '85%';
      cupSteam.style.opacity = '1';
      if (window.SoundFX) SoundFX.playPour();
    } 
    else if (targetId === 'bottle-dropzone' && !bottleState.hasTea) {
      bottleState.hasTea = true;
      bottleState.temp = 100;
      bottleLiquid.style.height = '85%';
      bottleSteam.style.opacity = '1'; // Brief puff of steam
      if (window.SoundFX) SoundFX.playPour();
      setTimeout(() => { 
        bottleLid.style.top = '-5px'; // Lid snaps shut!
        bottleSteam.style.opacity = '0'; // Steam gets trapped
        if (window.SoundFX) SoundFX.playSnap();
      }, 500); 
    }
  }

  // --- 3. Physics & Rendering Loop ---
  setInterval(() => {
    // Regular cup loses heat constantly
    if (cupState.hasTea && cupState.temp > 10) {
      cupState.temp -= 0.6; // Speed of cooling
      if (cupState.temp < 50) cupSteam.style.opacity = '0'; // Steam vanishes when cool
    }
    
    // Magic bottle keeps heat (loses it almost invisibly)
    if (bottleState.hasTea && bottleState.temp > 10) {
      bottleState.temp -= 0.01; 
    }

    if (cupState.hasTea && bottleState.hasTea && cupState.temp <= 20) {
        document.getElementById('why-though-btn').style.display = 'block';
    }

    updateUI();
  }, 50);

  // --- 4. Color Logic & UI Updates ---
  function updateUI() {
    if (cupState.hasTea) {
      cupTempBar.style.height = cupState.temp + '%';
      let color = getTemperatureColor(cupState.temp);
      cupTempBar.style.background = color;
      cupLiquid.style.background = color;
    }
    if (bottleState.hasTea) {
      bottleTempBar.style.height = bottleState.temp + '%';
      let color = getTemperatureColor(bottleState.temp);
      bottleTempBar.style.background = color;
      bottleLiquid.style.background = color;
    }
  }

  // Blends from Hot Orange (#ff5722) to Cold Blue (#03a9f4)
  function getTemperatureColor(temp) {
    const ratio = Math.max(0, Math.min(1, (temp - 20) / 80)); 
    const r = Math.floor(3 + (255 - 3) * ratio); 
    const g = Math.floor(169 + (87 - 169) * ratio);
    const b = Math.floor(244 + (34 - 244) * ratio);
    return `rgb(${r}, ${g}, ${b})`;
  }

  // --- 5. Reset Game ---
  function resetGame() {
    cupState = { hasTea: false, temp: 0 };
    bottleState = { hasTea: false, temp: 0 };
    
    cupLiquid.style.height = '0%';
    bottleLiquid.style.height = '0%';
    
    cupTempBar.style.height = '0%';
    bottleTempBar.style.height = '0%';
    
    cupSteam.style.opacity = '0';
    bottleSteam.style.opacity = '0';
    
    bottleLid.style.top = '-50px'; // Open lid
    document.getElementById('why-though-btn').style.display = 'none';
  }

  // Notify parent when user is done
  document.getElementById('why-though-btn').addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
  });
</script>

</body>
</html>
