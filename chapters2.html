<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@1,529&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Flavors&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/styles.css">

    <style>
        /* Responsive, single-row Button Toy Styles */
        .notebook-btn {
            display: flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 6px solid #b0b0b0;
            border-radius: 35px;
            padding: 3vw 2vw;
            box-shadow: 0 12px 0 #b0b0b0, 0 20px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1);

            /* Crucial for keeping them in 1 row without extending the screen */
            flex: 1 1 0;
            min-width: 0;
            margin: 0;
            text-align: center;
            text-decoration: none;
            color: #2c2c2c;
        }

        .notebook-btn:hover {
            color: #0b5ed7;
            text-decoration: none;
        }

        .notebook-btn:active {
            transform: translateY(12px) !important;
            box-shadow: 0 0 0 #b0b0b0, 0 6px 10px rgba(0, 0, 0, 0.1);
        }

        .chapter-gif {
            width: 60%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 2vw;
        }

        .notebook-btn span {
            line-height: 1.1;
            /* Font scales dynamically but never gets too huge or too tiny */
            font-size: clamp(24px, 4vw, 70px) !important;
        }
    </style>
</head>

<body class="chapter-index">

    <nav class="navbar navbar-expand-lg navigation-bar ">
        <li class="navbar-brand brand">
            <a class="nav-link" href="./index.html"><img src="images/favicon-32x32.png" alt="icon">WhyTho</a>
        </li>
        <ul class="navbar-nav ms-auto bundle-nav">
            <li class="nav-item">
                <a class="nav-link link-nav" href="">contact</a>
            </li>
            <li class="nav-item">
                <a class="nav-link link-nav" href="">about</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href=""><button type="button" class="btn btn-light">Sign In</button></a>
            </li>
        </ul>
    </nav>

    <!-- Centered, Non-wrapping Flex Layout -->
    <div class="container-fluid d-flex justify-content-center align-items-center"
        style="min-height: 80vh; padding: 0 4vw; overflow: hidden;">
        <div class="d-flex flex-nowrap justify-content-center align-items-center w-100" style="gap: 3vw;">

            <!-- Chapter 1: Heat -->
            <a class="notebook-btn" href="./heat.html">
                <img src="https://media.tenor.com/sFBubyGnMnYAAAAi/sweating-om-nom.gif" class="chapter-gif" alt="Heat">
                <span>Heat</span>
            </a>



            <!-- Chapter 3: Push, Pull -->
            <a class="notebook-btn" href="./push_pull.html">
                <img src="https://media.tenor.com/0X9oRVFTMkAAAAAm/couple-angry.webp" class="chapter-gif"
                    alt="Push, Pull">
                <span>Push, Pull</span>
            </a>

            <!-- Chapter 2: Why things fall -->
            <a class="notebook-btn" href="./why_things_fall.html">
                <img src="https://media.tenor.com/4jrT5qI5S5MAAAAM/jagyasini-apple.gif" class="chapter-gif"
                    alt="Why things fall">
                <span>Why things fall</span>
            </a>

        </div>
    </div>

    <!-- Keep the satisfying click sounds! -->
    <script src="sound_fx.js"></script>
    <script>
        document.querySelectorAll('.notebook-btn').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                if (window.SoundFX) SoundFX.playClick();
            });
        });
    </script>
</body>

</html>
