<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhyTho: The Heavy Floor</title>
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #05070a;
            --floor: #fbbf24;
            --button: #8b5cf6;
        }

        body {
            margin: 0;
            background: var(--sky);
            color: white;
            font-family: 'Walter Turncoat', cursive;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 80%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            text-align: center;
            z-index: 100;
        }

        #status {
            font-size: 1.2rem;
            color: var(--floor);
        }

        #number {
            font-size: 2.5rem;
            display: block;
            margin: 5px 0;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--button);
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        #why {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #f8e5b4;
            border: 3px solid #5a4b3c;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Walter Turncoat';
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="ui">
        <span id="status">Normal Jumps</span>
        <b id="number">9.8</b>
        <input type="range" id="pullSlider" min="1" max="100" step="1" value="9.8">
        <div class="labels">
            <span>FLOATY</span>
            <span>SUPER HEAVY</span>
        </div>
    </div>

    <canvas id="game"></canvas>
    <button id="why">WHY?</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('pullSlider');

        let w, h, ground;
        let dust = [];
        let friends = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            ground = h - 100;
            friends = ['🏃', '🤸', '💃', '🕴️', '🧍'].map((e, i) => ({
                x: (w / 6) * (i + 1),
                y: ground,
                v: 0,
                emoji: e,
                squish: 1,
                timer: 0,
                isResting: true
            }));
        }

        function update() {
            const pull = parseFloat(slider.value);
            document.getElementById('number').innerText = pull.toFixed(1);

            const msg = document.getElementById('status');
            if (pull < 10) msg.innerText = "Easy to Jump!";
            else if (pull < 40) msg.innerText = "Getting Heavy...";
            else msg.innerText = "SO HEAVY! Hard to move!";

            friends.forEach(f => {
                if (!f.isResting) {
                    f.v += (pull * 0.04);
                    f.y += f.v;
                    f.squish += (1 - f.squish) * 0.1;
                }

                // Hit the floor
                if (f.y >= ground) {
                    f.y = ground;
                    f.v = 0;
                    f.isResting = true;
                    f.squish = 0.5; // Stay flat
                }

                // Struggle to get back up
                if (f.isResting) {
                    f.timer++;
                    // High pull makes you wait much longer (up to 2 seconds)
                    let waitTime = 10 + (pull * 0.8);

                    if (f.timer > waitTime) {
                        // Small jump if heavy, big jump if light
                        f.v = -18 + (pull * 0.1);
                        if (f.v > -5) f.v = -5; // Minimum jump so they move a bit

                        f.squish = 1.5;
                        f.timer = 0;
                        f.isResting = false;
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = "#fbbf24";
            ctx.beginPath();
            ctx.roundRect(0, ground + 20, w, h, [30, 30, 0, 0]);
            ctx.fill();

            friends.forEach(f => {
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.scale(2 - f.squish, f.squish);
                ctx.font = "60px serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                ctx.fillText(f.emoji, 0, 20);
                ctx.restore();
            });

            update();
            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();

        // Trigger parent library to play the associated video
        document.getElementById('why').addEventListener('click', () => {
            window.parent.postMessage('playVideo', '*');
        });

    </script>
</body>

</html>
