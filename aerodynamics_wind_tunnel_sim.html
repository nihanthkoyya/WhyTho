<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerodynamics Wind Tunnel</title>
  <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #020617;
      font-family: system-ui, sans-serif;
      color: #f8fafc;
      touch-action: none;
      /* Prevents page scrolling while dragging */
    }

    .container {
      position: relative;
      background: #0f172a;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid #1e293b;
      transform: scale(1.3);
      transform-origin: center;
    }

    canvas {
      background: #000000;
      border-radius: 12px;
      touch-action: none;
    }

    .hud {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 200px;
      background: rgba(15, 23, 42, 0.8);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .hud-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #94a3b8;
    }

    .meter-bg {
      width: 100%;
      height: 20px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .meter-fill {
      height: 100%;
      width: 100%;
      background: #ef4444;
      transition: width 0.3s, background 0.3s;
    }

    .goal-line {
      position: absolute;
      top: 0;
      left: 30%;
      width: 2px;
      height: 100%;
      background: #fff;
      z-index: 2;
    }

    .instructions {
      margin-top: 16px;
      text-align: center;
      color: #cbd5e1;
      font-size: 15px;
    }
    #why-though-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-family: 'Walter Turncoat', cursive;
      font-size: 1.5rem;
      background-color: #f8e5b4;
      border: 3px solid #5a4b3c;
      border-radius: 10px;
      color: #5a4b3c;
      padding: 10px 20px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 60;
      transition: transform 0.2s;
    }
    #why-though-btn:hover {
      transform: scale(1.05);
    }
  </style>
    <script src="sound_fx.js"></script>
</head>

<body>

  <div class="container">
    <div class="hud">
      <div class="hud-title">Drag Coefficient Gauge</div>
      <div class="meter-bg">
        <div class="meter-fill" id="dragMeter"></div>
        <div class="goal-line"></div>
      </div>
      <div class="hud-title" style="margin-top: 8px; color: #10b981;" id="successText"></div>
    </div>
    <canvas id="sim" width="800" height="450"></canvas>
    <div class="instructions">Drag the orange clay pieces onto the dashed outlines on the car.</div>
  </div>

  <button id="why-though-btn">Why though?</button>

  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const meter = document.getElementById('dragMeter');
    const successText = document.getElementById('successText');

    // Sound effect for interaction
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    function playDragSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // Simulation State
    let dragValue = 100;
    const GOAL = 30;

    const car = { x: 350, y: 220, w: 160, h: 70 };

    const parts = [
      {
        id: 'cone', x: 200, y: 360, startX: 200, startY: 360, targetX: 270, targetY: 220, w: 80, h: 70, attached: false,
        drawPath: (ctx, x, y) => {
          ctx.beginPath(); ctx.moveTo(x + 80, y); ctx.lineTo(x + 80, y + 70); ctx.lineTo(x, y + 70); ctx.closePath();
        }
      },
      {
        id: 'roof', x: 450, y: 360, startX: 450, startY: 360, targetX: 350, targetY: 180, w: 160, h: 40, attached: false,
        drawPath: (ctx, x, y) => {
          ctx.beginPath(); ctx.moveTo(x, y + 40); ctx.quadraticCurveTo(x + 80, y - 10, x + 160, y + 40); ctx.closePath();
        }
      }
    ];

    let draggedPart = null;

    // Particle System
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * -200;
        this.y = 150 + Math.random() * 140;
        this.vx = 8 + Math.random() * 3;
        this.vy = 0;
        this.color = '#38bdf8';
        this.size = 1.5 + Math.random();
        this.chaos = false;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;

        const hasCone = parts[0].attached;
        const hasRoof = parts[1].attached;

        if (this.x > 320 && this.x < 360 && this.y > 200 && this.y < 290) {
          if (!hasCone) {
            this.color = '#ef4444';
            this.vx = -1 + Math.random() * -4;
            this.vy = -5 + Math.random() * 10;
            this.chaos = true;
          }
        }

        if (hasCone && this.x > 250 && this.x < 350 && this.y > 200 && this.y < 290) {
          this.vy = (this.y < 255) ? -4 : 4;
          this.color = '#818cf8';
        }

        if (this.x > 350 && this.x < 510) {
          if (this.y > 180 && this.y < 220) {
            if (!hasRoof && this.vy < 0) {
              this.color = '#f59e0b';
              this.vy += 0.8;
              this.vx = 3;
              this.chaos = true;
            } else if (hasRoof && this.y < 200) {
              this.vy = 0;
              this.vx = 10;
              this.color = '#38bdf8';
            }
          }
        }

        if (this.chaos) this.vy += 0.2;

        if (this.x > canvas.width || this.y < 0 || this.y > canvas.height || (this.chaos && Math.random() < 0.03)) {
          this.reset();
        }
      }
      draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size * 4, this.size);
      }
    }

    const particles = Array.from({ length: 300 }, () => new Particle());

    // Input Handling (Upgraded to Pointer Events for perfect mouse/touch support)
    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('pointerdown', (e) => {
      const { x, y } = getMousePos(e);
      parts.forEach(p => {
        const px = p.attached ? p.targetX : p.x;
        const py = p.attached ? p.targetY : p.y;
        if (x > px && x < px + p.w && y > py && y < py + p.h) {
          draggedPart = p;
          p.attached = false;
          canvas.setPointerCapture(e.pointerId); // Locks pointer to canvas even if dragged outside
          canvas.style.cursor = 'grabbing';
          playDragSound();
        }
      });
    });

    canvas.addEventListener('pointermove', (e) => {
      const { x, y } = getMousePos(e);

      if (draggedPart) {
        draggedPart.x = x - draggedPart.w / 2;
        draggedPart.y = y - draggedPart.h / 2;
      } else {
        let isHovering = false;
        parts.forEach(p => {
          const px = p.attached ? p.targetX : p.x;
          const py = p.attached ? p.targetY : p.y;
          if (x > px && x < px + p.w && y > py && y < py + p.h) isHovering = true;
        });
        canvas.style.cursor = isHovering ? 'pointer' : 'default';
      }
    });

    canvas.addEventListener('pointerup', (e) => {
      if (draggedPart) {
        canvas.releasePointerCapture(e.pointerId);
        const dx = draggedPart.x - draggedPart.targetX;
        const dy = draggedPart.y - draggedPart.targetY;

        if (Math.sqrt(dx * dx + dy * dy) < 100) { // Snap radius
          draggedPart.attached = true;
          draggedPart.x = draggedPart.targetX;
          draggedPart.y = draggedPart.targetY;
          if (window.SoundFX) SoundFX.playSnap();
        } else {
          draggedPart.x = draggedPart.startX;
          draggedPart.y = draggedPart.startY;
        }
        draggedPart = null;
        canvas.style.cursor = 'default';
      }
    });

    // Notify parent when user is done
    document.getElementById('why-though-btn').addEventListener('click', () => {
        window.parent.postMessage('playVideo', '*');
    });

    // Render Loop
    function update() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      dragValue = 100 - (parts[0].attached ? 40 : 0) - (parts[1].attached ? 30 : 0);

      meter.style.width = `${dragValue}%`;
      meter.style.background = dragValue <= GOAL ? '#10b981' : (dragValue < 70 ? '#f59e0b' : '#ef4444');
      successText.textContent = dragValue <= GOAL ? 'SPEED GOAL REACHED!' : '';

      if (dragValue <= GOAL && !window.hasWon) {
          window.hasWon = true;
          if (window.SoundFX) SoundFX.playSuccess();
      }
      if (dragValue > GOAL) window.hasWon = false;

      particles.forEach(p => { p.update(); p.draw(ctx); });

      // Floor line
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 290); ctx.lineTo(800, 290); ctx.stroke();

      ctx.save();
      // Shake effect
      if (dragValue > 40) {
        const intensity = (dragValue - 40) * 0.05;
        ctx.translate((Math.random() - 0.5) * intensity, (Math.random() - 0.5) * intensity);
      }

      // Car Body & Wheels
      ctx.fillStyle = '#64748b';
      ctx.fillRect(car.x, car.y, car.w, car.h);

      ctx.fillStyle = '#1e293b';
      ctx.beginPath(); ctx.arc(car.x + 30, car.y + 70, 16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(car.x + 130, car.y + 70, 16, 0, Math.PI * 2); ctx.fill();

      ctx.restore();

      // Bottom Station Backdrop
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 340, 800, 110);
      ctx.fillStyle = '#334155';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('CLAY STATION', 20, 360);

      // Draw Target Outlines (Hints)
      parts.forEach(p => {
        if (!p.attached) {
          p.drawPath(ctx, p.targetX, p.targetY);
          ctx.strokeStyle = 'rgba(249, 115, 22, 0.4)';
          ctx.setLineDash([5, 5]);
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.setLineDash([]);
        }
      });

      // Draw Solid Clay Parts
      parts.forEach(p => {
        const px = p.attached ? p.targetX : p.x;
        const py = p.attached ? p.targetY : p.y;

        p.drawPath(ctx, px, py);
        ctx.fillStyle = p.attached ? '#10b981' : '#f97316'; // Turns green on success

        if (draggedPart === p) {
          ctx.shadowColor = 'rgba(249, 115, 22, 0.8)';
          ctx.shadowBlur = 15;
        } else {
          ctx.shadowBlur = 0;
        }

        ctx.fill();
      });
      ctx.shadowBlur = 0;

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>

</html>
