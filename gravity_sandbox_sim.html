<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d17;
            --accent: #4da6ff;
            --ui-bg: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Walter Turncoat', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #earth-globe {
            position: absolute;
            height: 90vh;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .spawn-dock {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .spawn-btn {
            background: none;
            border: 2px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spawn-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .bottom-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #reset-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-family: 'Walter Turncoat', cursive;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        #why-btn {
            position: absolute;
            right: 20px;
            background: #f8e5b4;
            color: #5a4b3c;
            border: 3px solid #5a4b3c;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Walter Turncoat', cursive;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>

<body>

    <img id="earth-globe" src="images/happy-cartoon-earth-globe-png.png" alt="Earth">

    <canvas id="canvas"></canvas>

    <div class="ui-layer">
        <div class="spawn-dock">
            <button class="spawn-btn" onclick="spawn('🍎')">🍎</button>
            <button class="spawn-btn" onclick="spawn('☄️')">☄️</button>
            <button class="spawn-btn" onclick="spawn('🛸')">🛸</button>
            <button class="spawn-btn" onclick="spawn('🧍')">🧍</button>
        </div>

        <div class="bottom-controls">
            <button id="reset-btn" onclick="resetSim()">do again 🔄</button>
            <button id="why-btn">WHY?</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let width, height, centerX, centerY, earthRadius;
        let objects = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            earthRadius = (height * 0.9) / 2.3;
        }

        // Sound Engine
        function playFallSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);

            gain.gain.setValueAtTime(1.0, audioCtx.currentTime); // Max Volume
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function playHitSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);

            gain.gain.setValueAtTime(1.0, audioCtx.currentTime); // Max Volume
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        class FallingObject {
            constructor(x, y, emoji) {
                this.x = x;
                this.y = y;
                this.emoji = emoji;
                this.size = 40;
                this.speed = 3 + Math.random() * 2;
                this.stuck = false;
                this.angle = Math.atan2(centerY - this.y, centerX - this.x);
                playFallSound();
            }

            update() {
                if (this.stuck) return;

                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < earthRadius) {
                    this.stuck = true;
                    playHitSound();
                    return;
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }

            draw() {
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        function spawn(emoji) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let x, y;
            const side = Math.floor(Math.random() * 4);
            if (side === 0) { x = Math.random() * width; y = -50; }
            else if (side === 1) { x = Math.random() * width; y = height + 50; }
            else if (side === 2) { x = -50; y = Math.random() * height; }
            else { x = width + 50; y = Math.random() * height; }

            objects.push(new FallingObject(x, y, emoji));
        }

        function resetSim() {
            objects = [];
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            objects.forEach(obj => {
                obj.update();
                obj.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>

</html>
