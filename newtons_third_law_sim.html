<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newton's Third Law - Big & Loud</title>
  <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      user-select: none;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .game-container {
      width: 95vw;
      height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      border-bottom: 6px solid #bcc0c4;
      cursor: grab;
      width: 100%;
      height: 100%;
    }

    canvas:active {
      cursor: grabbing;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      background: #ff4757;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #cf3544;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #cf3544;
    }

    #why-though-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      font-family: 'Walter Turncoat', cursive;
      font-size: 2rem;
      background-color: #f8e5b4;
      border: 4px solid #5a4b3c;
      border-radius: 15px;
      color: #5a4b3c;
      padding: 15px 30px;
      box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>

<body>

  <div class="game-container">
    <canvas id="simCanvas"></canvas>
    <div class="controls">
      <button id="resetBtn">do again 🔄</button>
    </div>
  </div>

  <button id="why-though-btn">why?</button>

  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const resetBtn = document.getElementById('resetBtn');

    // Dynamic Sizing
    function resize() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let state = {
      wallX: 80,
      baseSpringWidth: 350,
      springWidth: 350,
      boySize: 120,
      boyX: 430,
      force: 0,
      velocity: 0,
      released: false,
      isDragging: false
    };

    // --- Audio Engine ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let dragOsc, dragGain, flyOsc, flyGain;

    function initAudio() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startDragSound() {
      initAudio();
      dragOsc = audioCtx.createOscillator();
      dragGain = audioCtx.createGain();
      dragOsc.type = 'sawtooth';
      dragGain.gain.value = 0;
      dragOsc.connect(dragGain).connect(audioCtx.destination);
      dragOsc.start();
    }

    function updateDragSound(f) {
      if (dragOsc) {
        dragOsc.frequency.setTargetAtTime(80 + (f * 0.5), audioCtx.currentTime, 0.05);
        dragGain.gain.setTargetAtTime(f > 0 ? 0.1 : 0, audioCtx.currentTime, 0.05);
      }
    }

    function playSnapSound() {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
      g.gain.setValueAtTime(1, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.connect(g).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }

    function startFlySound() {
      flyOsc = audioCtx.createOscillator();
      flyGain = audioCtx.createGain();
      flyOsc.type = 'sine'; // Whistling whoosh
      flyGain.gain.value = 0;
      flyOsc.connect(flyGain).connect(audioCtx.destination);
      flyOsc.start();
    }

    function updateFlySound(vel) {
      if (flyOsc) {
        flyOsc.frequency.setTargetAtTime(200 + (vel * 10), audioCtx.currentTime, 0.1);
        flyGain.gain.setTargetAtTime(Math.min(0.2, vel * 0.02), audioCtx.currentTime, 0.1);
      }
    }

    // --- Logic ---
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x >= state.boyX && x <= state.boyX + state.boySize && !state.released) {
        state.isDragging = true;
        startDragSound();
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (state.isDragging) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        state.springWidth = Math.max(100, Math.min(state.baseSpringWidth, x - state.wallX));
        state.force = state.baseSpringWidth - state.springWidth;
        state.boyX = state.wallX + state.springWidth;
        updateDragSound(state.force);
      }
    });

    window.addEventListener('mouseup', () => {
      if (state.isDragging) {
        state.isDragging = false;
        if (dragOsc) dragOsc.stop();
        if (state.force > 10) {
          state.released = true;
          state.velocity = state.force * 0.3;
          playSnapSound();
          startFlySound();
        }
      }
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const centerY = canvas.height / 2 + 50;

      // Ground
      ctx.fillStyle = '#dfe4ea';
      ctx.fillRect(0, centerY + 60, canvas.width, 200);

      // Wall
      ctx.fillStyle = '#707070';
      ctx.fillRect(state.wallX - 30, centerY - 150, 30, 210);

      // Spring
      ctx.beginPath();
      ctx.moveTo(state.wallX, centerY);
      const coils = 20;
      const gap = state.springWidth / coils;
      for (let i = 0; i < coils; i++) {
        ctx.lineTo(state.wallX + gap * i + gap / 2, i % 2 === 0 ? centerY - 30 : centerY + 30);
      }
      ctx.lineTo(state.wallX + state.springWidth, centerY);
      ctx.strokeStyle = '#a4b0be';
      ctx.lineWidth = 8;
      ctx.stroke();

      // Boy
      ctx.fillStyle = '#1e90ff';
      ctx.fillRect(state.boyX, centerY - 60, state.boySize, state.boySize);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText('BOY', state.boyX + 35, centerY);

      // Forces
      if (state.isDragging && state.force > 5) {
        drawArrow(state.boyX + state.boySize / 2, centerY - 100, state.force * 1.5, -1, "Action", "#ff4757");
      } else if (state.released && state.velocity > 2) {
        drawArrow(state.boyX + state.boySize / 2, centerY - 100, state.force * 1.5, 1, "Reaction", "#2ed573");
      }

      // Physics
      if (state.released) {
        state.boyX += state.velocity;
        state.velocity *= 0.97; // High friction
        updateFlySound(state.velocity);
        if (state.springWidth < state.baseSpringWidth) state.springWidth += 30;
        if (state.velocity < 0.5) {
          if (flyOsc) { flyOsc.stop(); flyOsc = null; }
        }
      }

      requestAnimationFrame(draw);
    }

    function drawArrow(x, y, len, dir, txt, col) {
      const endX = x + len * dir;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endX, y);
      ctx.lineTo(endX - 15 * dir, y - 10);
      ctx.moveTo(endX, y);
      ctx.lineTo(endX - 15 * dir, y + 10);
      ctx.strokeStyle = col;
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.fillStyle = col;
      ctx.font = "bold 20px sans-serif";
      ctx.fillText(txt, x + (len / 2 * dir) - 30, y - 20);
    }

    resetBtn.addEventListener('click', () => {
      state.released = false;
      state.velocity = 0;
      state.force = 0;
      state.springWidth = state.baseSpringWidth;
      state.boyX = state.wallX + state.baseSpringWidth;
      if (flyOsc) { flyOsc.stop(); flyOsc = null; }
    });

    document.getElementById('why-though-btn').addEventListener('click', () => {
      window.parent.postMessage('playVideo', '*');
    });

    draw();
  </script>
</body>

</html>
