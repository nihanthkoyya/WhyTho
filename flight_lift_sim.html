<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhyTho: Fun Fly</title>
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #0a0e1a;
            --bus: #ffcc00;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--sky);
            overflow: hidden;
            font-family: 'Walter Turncoat', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #text-box {
            position: absolute;
            top: 50px;
            text-align: center;
            color: white;
            z-index: 100;
            pointer-events: none;
        }

        .ui {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .btn {
            background: #ffffff;
            color: #333;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Walter Turncoat';
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .btn.on {
            background: var(--bus);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }

        #why {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #f8e5b4;
            color: #5a4b3c;
            border: 3px solid #5a4b3c;
            border-radius: 10px;
            padding: 12px 24px;
            cursor: pointer;
            z-index: 100;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <div id="text-box">
        <h1 id="top-text">Ready to play!</h1>
        <p id="bottom-text">Put on wings and go fast!</p>
    </div>

    <div class="ui">
        <button id="wBtn" class="btn">Wings</button>
        <button id="eBtn" class="btn">Start</button>
    </div>

    <button id="why">WHY?</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        let w, h, wings = false, motor = false;
        let roadX = 0, speed = 0;
        let stars = [], particles = [];

        const bus = {
            w: 200, h: 100,
            x: 0, y: 0,
            targetY: 0,
            flap: 0
        };

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            bus.x = w * 0.2;
            bus.y = h - 220;
            bus.targetY = bus.y;
            stars = Array.from({ length: 40 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                s: 2 + Math.random() * 5
            }));
        }

        function play(f, type = 'sine') {
            if (audio.state === 'suspended') audio.resume();
            const o = audio.createOscillator(), g = audio.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audio.currentTime);
            g.gain.setValueAtTime(0.8, audio.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.3);
            o.connect(g); g.connect(audio.destination);
            o.start(); o.stop(audio.currentTime + 0.3);
        }

        function update() {
            // Speed
            let targetS = motor ? 25 : 0;
            speed += (targetS - speed) * 0.03;

            // Lift
            let fly = motor && wings;
            bus.targetY = fly ? h * 0.4 : h - 220;
            bus.y += (bus.targetY - bus.y) * 0.04;

            // Flapping "Slap" Motion
            if (motor && wings) {
                bus.flap = Math.sin(Date.now() * 0.015) * 40;
            } else {
                bus.flap = 0;
            }

            // Move Environment
            roadX = (roadX - speed) % 100;
            stars.forEach(s => {
                s.x -= speed * (s.s / 10);
                if (s.x < -10) s.x = w + 10;
            });

            // Smoke
            if (motor && Math.random() > 0.5) {
                particles.push({ x: bus.x, y: bus.y + bus.h - 20, vx: -5 - Math.random() * 5, a: 1 });
            }
            particles.forEach((p, i) => {
                p.x += p.vx; p.a -= 0.02;
                if (p.a <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);

            // Boring Stars
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.fillRect(s.x, s.y, 2, 2);
            });

            // Ground Lines
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 6;
            for (let i = -100; i < w + 100; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i + roadX, h - 100);
                ctx.lineTo(i + roadX + 40, h - 100);
                ctx.stroke();
            }

            // Smoke
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.a})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });

            // THE BUS
            const bx = bus.x, by = bus.y + (Math.sin(Date.now() * 0.004) * 8);

            // Slapping Wings
            if (wings) {
                ctx.fillStyle = "#888";
                // Left
                ctx.save();
                ctx.translate(bx + 50, by + 40);
                ctx.rotate(bus.flap * Math.PI / 180);
                ctx.fillRect(-80, -10, 80, 20);
                ctx.restore();
                // Right
                ctx.save();
                ctx.translate(bx + bus.w - 50, by + 40);
                ctx.rotate(-bus.flap * Math.PI / 180);
                ctx.fillRect(0, -10, 80, 20);
                ctx.restore();
            }

            // Big Body
            ctx.fillStyle = "#ffcc00";
            ctx.beginPath();
            ctx.roundRect(bx, by, bus.w, bus.h, 15);
            ctx.fill();

            // Windows
            ctx.fillStyle = motor ? "#00f2ff" : "#fff";
            for (let i = 0; i < 3; i++) {
                ctx.roundRect(bx + 20 + (i * 55), by + 15, 45, 40, 8);
                ctx.fill();
            }

            // Wheels
            ctx.fillStyle = "#222";
            [40, bus.w - 40].forEach(o => {
                ctx.beginPath();
                ctx.arc(bx + o, by + bus.h, 22, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(() => { update(); draw(); });
        }

        // Logic
        document.getElementById('wBtn').onclick = (e) => {
            wings = !wings;
            e.target.classList.toggle('on');
            play(wings ? 400 : 200);
            updateLabels();
        };

        document.getElementById('eBtn').onclick = (e) => {
            motor = !motor;
            e.target.classList.toggle('on');
            e.target.innerText = motor ? "Stop" : "Start";
            play(motor ? 150 : 75, 'sawtooth');
            updateLabels();
        };

        function updateLabels() {
            const t = document.getElementById('top-text');
            const b = document.getElementById('bottom-text');
            if (wings && motor) { t.innerText = "WE ARE FLYING!"; b.innerText = "The wind is pushing us up!"; }
            else if (motor) { t.innerText = "Going fast!"; b.innerText = "But we need wings to fly."; }
            else if (wings) { t.innerText = "Wings are on!"; b.innerText = "Now we need to go fast!"; }
            else { t.innerText = "Ready to play!"; b.innerText = "Put on wings and go fast!"; }
        }

        window.onresize = init;
        init(); draw();

        // Trigger parent library to play the associated video
        document.getElementById('why').addEventListener('click', () => {
            window.parent.postMessage('playVideo', '*');
        });

    </script>
</body>

</html>
